<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Apple Catcher Game</title> <style> body { background-color: #121212; color: #ffffff; font-family: Arial, sans-serif; } canvas { display: block; margin: 0 auto; border: 2px solid #f00; } .banner { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.8); color: #00ff00; padding: 10px; border-radius: 5px; } </style> </head> <body> <div class="banner" id="banner">Welcome to Apple Catcher! Level 1</div> <canvas id="gameCanvas" width="480" height="320"></canvas> <script> const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d'); const banner = document.getElementById('banner'); let score = 0; let level = 1; const apples = []; const bombs = []; let basketX = canvas.width / 2 - 40; let basketWidth = 80; let isPaused = false; let difficulty = 1000; const maxLevel = 7; let levelProgression = [100, 200, 300, 400, 500, 600, 700]; function adjustDifficulty() { difficulty = Math.max(200, 1000 - (level - 1) * 100); } function drawBasket() { ctx.fillStyle = '#00ff00'; ctx.fillRect(basketX, canvas.height - 30, basketWidth, 20); } function spawnApple() { apples.push({ x: Math.random() * (canvas.width - 20), y: 0 }); } function spawnBomb() { bombs.push({ x: Math.random() * (canvas.width - 20), y: 0 }); } function drawApples() { apples.forEach(apple => { ctx.fillStyle = '#f00'; ctx.fillRect(apple.x, apple.y, 20, 20); apple.y += 2 + level; if (apple.y > canvas.height) apples.splice(apples.indexOf(apple), 1); }); } function drawBombs() { bombs.forEach(bomb => { ctx.fillStyle = '#000'; ctx.fillRect(bomb.x, bomb.y, 20, 20); bomb.y += 3 + level; if (bomb.y > canvas.height) bombs.splice(bombs.indexOf(bomb), 1); }); } function updateScore() { if (score >= levelProgression[level - 1] && level < maxLevel) { level++; banner.innerText = 'Welcome to Apple Catcher! Level ' + level; adjustDifficulty(); } } function handleCollision() { apples.forEach(apple => { if (apple.y + 20 >= canvas.height - 30 && apple.x + 20 >= basketX && apple.x <= basketX + basketWidth) { score++; apples.splice(apples.indexOf(apple), 1); } }); bombs.forEach(bomb => { if (bomb.y + 20 >= canvas.height - 30 && bomb.x + 20 >= basketX && bomb.x <= basketX + basketWidth) { isPaused = true; alert('Game Over! Your score: ' + score); document.location.reload(); } }); } function update() { if (!isPaused) { ctx.clearRect(0, 0, canvas.width, canvas.height); drawApples(); drawBombs(); drawBasket(); handleCollision(); updateScore(); } requestAnimationFrame(update); } function togglePause() { isPaused = !isPaused; if (isPaused) { banner.innerText = 'Paused'; } else { banner.innerText = 'Welcome to Apple Catcher! Level ' + level; update(); } } window.addEventListener('mousemove', (event) => { basketX = event.clientX - canvas.getBoundingClientRect().left - basketWidth / 2; }); window.addEventListener('touchmove', (event) => { basketX = event.touches[0].clientX - canvas.getBoundingClientRect().left - basketWidth / 2; }); document.addEventListener('keydown', (event) => { if (event.key === 'p') togglePause(); }); setInterval(() => { spawnApple(); if (Math.random() < 0.3) spawnBomb(); }, difficulty); update(); </script> <script> if (!('serviceWorker' in navigator)) { console.log('Service Worker not supported'); } else { navigator.serviceWorker.register('service-worker.js'); } </script> </body> </html>
